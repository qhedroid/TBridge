<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('tbridge-theme')
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          const theme = stored === 'light' || stored === 'dark' ? stored : prefersDark ? 'dark' : 'light'
          document.documentElement.classList.toggle('dark', theme === 'dark')
          document.documentElement.setAttribute('data-theme', theme)
        } catch {
          document.documentElement.classList.add('dark')
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
    <title>TBridge — Offline Time Conversion</title>
    <meta name="description" content="Convert time across cities using an offline city index with DST-aware IANA timezone support." />
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)" />
    <meta property="og:title" content="TBridge — Offline Time Conversion" />
    <meta property="og:description" content="Convert time across cities using an offline city index with DST-aware IANA timezone support." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/clock.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

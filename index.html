<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('tbridge-theme')
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          const theme = stored === 'light' || stored === 'dark' ? stored : prefersDark ? 'dark' : 'light'
          document.documentElement.classList.toggle('dark', theme === 'dark')
          document.documentElement.setAttribute('data-theme', theme)
        } catch {
          document.documentElement.classList.add('dark')
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
    <title>TBridge — Offline Time Conversion</title>
    <meta name="description" content="Convert time across cities using an offline city index with DST-aware IANA timezone support." />
    <meta name="theme-color" content="#0f1117" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f6f2" media="(prefers-color-scheme: light)" />
    <meta property="og:title" content="TBridge — Offline Time Conversion" />
    <meta property="og:description" content="Convert time across cities using an offline city index with DST-aware IANA timezone support." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/assets/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/assets/og-image.svg" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
